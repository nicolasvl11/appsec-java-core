name: CI — Test & Coverage

on:
  push:
  pull_request:

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests (with Testcontainers enabled)
        run: ./mvnw test
        env:
          RUN_TC: "true"

      - name: Upload JaCoCo HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-html-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload JaCoCo XML for downstream processing
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-xml-report
          path: target/site/jacoco/jacoco.xml
          retention-days: 14

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Add coverage summary to job output
        if: always()
        run: |
          echo "## JaCoCo Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f target/site/jacoco/jacoco.xml ]; then
            MISSED=$(grep -oP 'missed="\K[0-9]+' target/site/jacoco/jacoco.xml | awk '{s+=$1} END {print s}')
            COVERED=$(grep -oP 'covered="\K[0-9]+' target/site/jacoco/jacoco.xml | awk '{s+=$1} END {print s}')
            TOTAL=$((MISSED + COVERED))
            if [ $TOTAL -gt 0 ]; then
              PCT=$(echo "scale=1; $COVERED * 100 / $TOTAL" | bc)
              echo "**Line coverage: ${PCT}%** (${COVERED} / ${TOTAL} lines)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_Coverage report not generated._" >> $GITHUB_STEP_SUMMARY
          fi
