apiVersion: 1

contactPoints:
  - orgId: 1
    name: appsec-webhook
    receivers:
      - uid: webhook-receiver
        type: webhook
        settings:
          url: ${GRAFANA_WEBHOOK_URL:-http://localhost:9999/webhook}
          httpMethod: POST
          maxAlerts: 10
        disableResolveMessage: false

  - orgId: 1
    name: appsec-email
    receivers:
      - uid: email-receiver
        type: email
        settings:
          addresses: ${GRAFANA_ALERT_EMAIL:-ops@example.com}
          singleEmail: false
        disableResolveMessage: false
