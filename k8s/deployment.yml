apiVersion: apps/v1
kind: Deployment
metadata:
  name: appsec-app
  namespace: appsec
  labels:
    app: appsec-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appsec-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: appsec-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: appsec-app
          image: ghcr.io/your-org/appsec-java-core:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: appsec-secrets
                  key: DB_URL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: appsec-secrets
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: appsec-secrets
                  key: DB_PASS
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: appsec-secrets
                  key: REDIS_HOST
            - name: app.jwt.private-key
              valueFrom:
                secretKeyRef:
                  name: appsec-secrets
                  key: JWT_PRIVATE_KEY
            - name: app.jwt.public-key
              valueFrom:
                secretKeyRef:
                  name: appsec-secrets
                  key: JWT_PUBLIC_KEY
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: appsec-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appsec-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: appsec-secrets
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appsec-secrets
                  key: GITHUB_CLIENT_SECRET
          envFrom:
            - configMapRef:
                name: appsec-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
