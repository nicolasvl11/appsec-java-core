name: Docker — Build & Security Scan

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-scan:
    name: Build image & Trivy scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: appsec-java-core:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy scan — fail on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: appsec-java-core:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Run Trivy scan — SARIF output for GitHub Security tab
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: appsec-java-core:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Add scan summary
        if: always()
        run: |
          echo "## Trivy Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Image: \`appsec-java-core:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- CRITICAL vulnerabilities block the build (exit-code 1)" >> $GITHUB_STEP_SUMMARY
          echo "- HIGH vulnerabilities reported to GitHub Security tab (SARIF)" >> $GITHUB_STEP_SUMMARY
