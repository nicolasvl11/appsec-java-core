services:
  postgres:
    image: postgres:16
    container_name: appsec-postgres
    environment:
      POSTGRES_DB: appsec
      POSTGRES_USER: appsec
      POSTGRES_PASSWORD: appsec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appsec -d appsec"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: appsec-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: appsec-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/appsec
      DB_USER: appsec
      DB_PASS: appsec
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RATELIMIT_TYPE: redis
      MANAGEMENT_HEALTH_REDIS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

volumes:
  pgdata:
