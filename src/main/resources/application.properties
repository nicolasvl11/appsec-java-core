server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/appsec}
spring.datasource.username=${DB_USER:appsec}
spring.datasource.password=${DB_PASS:appsec}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info

spring.security.user.name=dev
spring.security.user.password=devpass
spring.security.user.roles=ADMIN

app.trusted-proxies=127.0.0.1,::1
app.cors.allowed-origins=http://localhost:3000
# Base64-encoded HS256 key (>=256 bits). REPLACE IN PRODUCTION.
app.jwt.secret=dGhpcy1pcy1hLXZlcnktc2VjcmV0LWp3dC1rZXktZm9yLWRldg==
app.jwt.expiration-ms=86400000

# Throw NoHandlerFoundException for unknown routes so GlobalExceptionHandler can produce ProblemDetail
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
