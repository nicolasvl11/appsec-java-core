server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/appsec}
spring.datasource.username=${DB_USER:appsec}
spring.datasource.password=${DB_PASS:appsec}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
# Disable Redis health indicator by default; enabled only when Redis is configured
management.health.redis.enabled=false

spring.security.user.name=dev
spring.security.user.password=devpass
spring.security.user.roles=ADMIN

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

app.ratelimit.type=${RATELIMIT_TYPE:memory}
app.trusted-proxies=127.0.0.1,::1

# OAuth2 redirect URI sent to frontend after successful login
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}

# OAuth2 client registrations — replace placeholder values with real credentials in production
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:placeholder-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:placeholder-github-client-secret}
spring.security.oauth2.client.registration.github.scope=user:email
app.cors.allowed-origins=http://localhost:3000
# RSA-2048 key pair for JWT RS256 signing. REPLACE BOTH KEYS IN PRODUCTION.
app.jwt.private-
app.jwt.public-
app.jwt.expiration-ms=86400000

# Throw NoHandlerFoundException for unknown routes so GlobalExceptionHandler can produce ProblemDetail
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
